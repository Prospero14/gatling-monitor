<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gatling Monitor</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page">
  <div id="updating-banner" class="updating-banner" th:classappend="${updating} ? 'visible' : ''">
    <span class="pulse"></span>
    обновление статусов
  </div>

  <header class="header header-main">
    <div class="mascot-wrap">
      <img class="mascot"
           th:src="@{/img/mascot.png}"
           th:attr="data-fallback=@{/img/mascot.svg}"
           onerror="this.onerror=null;this.src=this.dataset.fallback"
           alt="Gatling Monitor"
           width="130"
           height="130">
    </div>
    <div class="title-block">
      <h1>GATLING MONITOR</h1>
      <p class="subtitle">// общий статус генераторов · ручное и авто-обновление</p>
    </div>
  </header>

  <section class="auto-refresh-bar">
    <form th:action="@{/auto-refresh}" method="post" class="auto-refresh-form" id="auto-refresh-form">
      <input type="hidden" name="enabled" value="false" id="auto-refresh-hidden">
      <label class="toggle">
        <input type="checkbox"
               id="auto-refresh-toggle"
               name="enabled"
               value="true"
               th:checked="${autoRefreshEnabled}"
               onchange="submitAutoRefresh(this)">
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
        <span class="toggle-label">Обновлять раз в 2 часа</span>
      </label>
    </form>
  </section>

  <section class="stats">
    <div class="stat">
      <span class="stat-label">Занято</span>
      <span class="stat-value" id="busy-count" th:text="${busyCount}">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Свободно</span>
      <span class="stat-value" id="free-count" th:text="${freeCount}">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Недоступно</span>
      <span class="stat-value" id="offline-count" th:text="${offlineCount}">0</span>
    </div>
  </section>

  <section class="panel">
    <div class="panel-head">
      <span>GEN_STATUS :: SHARED_CACHE</span>
      <div class="refresh-controls">
        <div id="refresh-progress" class="refresh-progress" th:classappend="${updating} ? 'visible' : ''">
          <span class="spinner"></span>
          <span class="progress-pct" id="progress-pct" th:text="${progressPercent} + '%'">0%</span>
        </div>
        <button type="button" class="refresh-btn" id="refresh-btn" th:disabled="${updating}">
          ↻ ОБНОВИТЬ СТАТУСЫ
        </button>
      </div>
    </div>
    <table>
      <thead>
      <tr>
        <th>Генератор</th>
        <th>Хост</th>
        <th>Статус</th>
        <th>Симуляция</th>
      </tr>
      </thead>
      <tbody id="status-body">
      <tr th:if="${statuses.isEmpty()}">
        <td colspan="4" class="empty-row">Нет сохранённых данных. Нажмите «Обновить статусы».</td>
      </tr>
      <tr th:each="item : ${statuses}">
        <td class="mono" th:text="${item.name}">generator-01</td>
        <td class="mono" th:text="${item.host}">10.0.0.1</td>
        <td>
          <span class="badge" th:classappend="${item.statusClass}" th:text="${item.statusLabel}">СВОБОДЕН</span>
          <div class="error-text" th:if="${!item.reachable and !item.authFailed}" th:text="${item.error}"></div>
        </td>
        <td class="simulation mono" th:text="${item.simulationsText}">—</td>
      </tr>
      </tbody>
    </table>
  </section>

  <footer class="footer">
    <span id="checked-at"
          th:text="${checkedAt != null} ? 'last_update: ' + ${#temporals.format(checkedAt, 'yyyy-MM-dd HH:mm:ss')} + ' UTC' : 'last_update: —'">
      last_update: —
    </span>
  </footer>
</div>

<script th:inline="javascript">
  const initiallyUpdating = [[${updating}]];
  let pollTimer = null;
  let wasUpdating = initiallyUpdating;

  function submitAutoRefresh(checkbox) {
    const hidden = document.getElementById('auto-refresh-hidden');
    hidden.disabled = checkbox.checked;
    document.getElementById('auto-refresh-form').submit();
  }

  function setProgressVisible(visible) {
    document.getElementById('refresh-progress').classList.toggle('visible', visible);
    document.getElementById('updating-banner').classList.toggle('visible', visible);
  }

  function setUpdatingUi(active) {
    const refreshBtn = document.getElementById('refresh-btn');
    setProgressVisible(active);
    if (refreshBtn) {
      refreshBtn.disabled = active;
    }
  }

  function updateProgress(percent) {
    document.getElementById('progress-pct').textContent = percent + '%';
  }

  async function startRefresh() {
    const refreshBtn = document.getElementById('refresh-btn');
    if (refreshBtn && refreshBtn.disabled) {
      return;
    }

    setUpdatingUi(true);
    updateProgress(0);

    try {
      const response = await fetch('/api/refresh', { method: 'POST' });
      if (!response.ok) {
        setUpdatingUi(false);
        return;
      }
      const data = await response.json();
      if (!data.started) {
        setUpdatingUi(false);
        return;
      }
      wasUpdating = true;
      schedulePoll(300);
    } catch (e) {
      setUpdatingUi(false);
    }
  }

  function schedulePoll(delayMs) {
    if (pollTimer) {
      clearTimeout(pollTimer);
    }
    pollTimer = setTimeout(pollStatus, delayMs);
  }

  async function pollStatus() {
    try {
      const response = await fetch('/api/status');
      if (!response.ok) {
        schedulePoll(1000);
        return;
      }
      const data = await response.json();
      updateProgress(data.progressPercent || 0);
      setUpdatingUi(data.updating);

      if (data.updating) {
        wasUpdating = true;
        schedulePoll(500);
        return;
      }

      if (wasUpdating) {
        updateProgress(100);
        window.location.reload();
        return;
      }
    } catch (e) {
      schedulePoll(1000);
    }
  }

  document.getElementById('refresh-btn').addEventListener('click', startRefresh);

  if (initiallyUpdating) {
    wasUpdating = true;
    schedulePoll(300);
  }
</script>
</body>
</html>
