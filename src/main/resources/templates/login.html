<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Gatling Monitor</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div id="popup-overlay" class="popup-overlay" th:classappend="${badCreds} ? 'visible' : ''">
  <div class="popup">
    <p class="popup-text" th:text="${popupMessage}">эх, ты, простофиля, креды проверь!</p>
    <button type="button" class="popup-btn" onclick="closePopup()">Ладно...</button>
  </div>
</div>

<div class="page page-narrow">
  <header class="header header-center">
    <div class="mascot-wrap">
      <img class="mascot"
           th:src="@{/img/mascot.png}"
           th:attr="data-fallback=@{/img/mascot.svg}"
           onerror="this.onerror=null;this.src=this.dataset.fallback"
           alt="Gatling Monitor"
           width="80"
           height="80">
    </div>
    <div class="title-block">
      <h1>GATLING MONITOR</h1>
      <p class="subtitle">// ssh-авторизация на генераторах</p>
    </div>
  </header>

  <section class="panel login-panel">
    <div class="panel-head">
      <span>AUTH :: SSH</span>
    </div>

    <div class="login-body">
      <div class="alert alert-warn" th:if="${locked}">
        Доступ заблокирован на 1 минуту после 2 неудачных попыток.
      </div>
      <div class="alert alert-info" th:if="${logout}">
        Вы вышли из системы.
      </div>
      <div class="alert alert-warn" th:if="${blocked}">
        Повторите попытку через <span th:text="${retryAfterSeconds}">60</span> сек.
      </div>

      <form th:action="@{/login}" method="post" class="login-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <label>
          <span>Логин SSH</span>
          <input type="text" name="username" autocomplete="username" required
                 th:disabled="${blocked}">
        </label>
        <label>
          <span>Пароль SSH</span>
          <input type="password" name="password" autocomplete="current-password" required
                 th:disabled="${blocked}">
        </label>
        <button type="submit" class="btn-primary" th:disabled="${blocked}">
          ВОЙТИ
        </button>
      </form>

      <p class="login-hint" th:if="${!blocked}">
        Осталось попыток: <span th:text="${remainingAttempts}">2</span>
      </p>
    </div>
  </section>
</div>

<script>
  function closePopup() {
    document.getElementById('popup-overlay').classList.remove('visible');
  }
</script>
</body>
</html>
